<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteggio Gironi Fantaltech</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎲 Sorteggio Ufficiale Fantaltech</h1>

<div class="section">
    <h3>Squadre Partecipanti</h3>
    <div class="teams-list" id="teamsContainer"></div>
</div>

<button id="drawBtn" onclick="startDraw()">Estrai Gironi</button>

<div class="container">
    <div class="girone" id="giochisti">
        <h2>⚽ Giochisti</h2>
    </div>
    <div class="girone" id="risultatisti">
        <h2>🔥 Risultatisti</h2>
    </div>
</div>

<div class="overlay" id="ceremonyOverlay">
    <div class="team-name" id="overlayTeam"></div>
    <div class="group-name" id="overlayGroup"></div>
</div>

<div id="finalText" class="final-text">GIRONI COMPLETI FANTALTECH 🎉</div>

<script>
const teams = [
    "hogiavinto",
    "morteam",
    "#finoallafinale",
    "hertha vernello",
    "kucos fellas",
    "smitolo",
    "Ahanor Londo",
    "Ribaltone"
];

const teamsContainer = document.getElementById("teamsContainer");
const giochistiDiv = document.getElementById("giochisti");
const risultatistiDiv = document.getElementById("risultatisti");
const button = document.getElementById("drawBtn");
const overlay = document.getElementById("ceremonyOverlay");
const overlayTeam = document.getElementById("overlayTeam");
const overlayGroup = document.getElementById("overlayGroup");
const finalText = document.getElementById("finalText");

teams.forEach(team => {
    const div = document.createElement("div");
    div.classList.add("team");
    div.textContent = team;
    teamsContainer.appendChild(div);
});

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function createParticles(x, y) {
    for(let i=0;i<20;i++){
        const p = document.createElement("div");
        p.className = "particle";
        const angle = Math.random()*2*Math.PI;
        const distance = 50 + Math.random()*50;
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        p.style.setProperty('--x', `${Math.cos(angle)*distance}px`);
        p.style.setProperty('--y', `${Math.sin(angle)*distance}px`);
        document.body.appendChild(p);
        setTimeout(()=>p.remove(), 1000);
    }
}

async function startDraw() {
    button.disabled = true;
    giochistiDiv.innerHTML = "<h2>⚽ Giochisti</h2>";
    risultatistiDiv.innerHTML = "<h2>🔥 Risultatisti</h2>";

    const shuffled = [...teams];
    shuffle(shuffled);

    let countGiochisti = 0;
    let countRisultatisti = 0;
    const teamElements = document.querySelectorAll(".team");

    for (let i = 0; i < shuffled.length; i++) {
        const teamName = shuffled[i];
        const currentElement = [...teamElements].find(el => el.textContent === teamName);

        overlayTeam.textContent = teamName;
        overlayGroup.textContent = "";
        overlay.classList.add("show");
        overlay.classList.remove("reveal");

        // Pallina volante
        const ball = document.createElement("div");
        ball.classList.add("ball");
        ball.textContent = teamName;
        document.body.appendChild(ball);

        const rect = currentElement.getBoundingClientRect();
        ball.style.left = `${rect.left + rect.width/2 - 25}px`;
        ball.style.top = `${rect.top + rect.height/2 - 25}px`;

        await sleep(1500);

        let assignTo;
        if (countGiochisti === 4) assignTo = "RISULTATISTI";
        else if (countRisultatisti === 4) assignTo = "GIOCHISTI";
        else assignTo = Math.random() < 0.5 ? "GIOCHISTI" : "RISULTATISTI";

        overlayGroup.textContent = "→ " + assignTo;
        overlay.classList.add("reveal");
        await sleep(1500);

        // Animazione pallina verso girone
        const targetDiv = assignTo === "GIOCHISTI" ? giochistiDiv : risultatistiDiv;
        const targetRect = targetDiv.getBoundingClientRect();
        ball.style.transform = `translate(${targetRect.left - rect.left + 80}px, ${targetRect.top - rect.top + 50}px)`;
        await sleep(1200);
        ball.remove();

        // Aggiunge squadra nel girone
        const newDiv = document.createElement("div");
        newDiv.classList.add("team", "fade-in");
        newDiv.textContent = teamName;
        if(assignTo==="GIOCHISTI"){ giochistiDiv.appendChild(newDiv); countGiochisti++; }
        else { risultatistiDiv.appendChild(newDiv); countRisultatisti++; }

        currentElement.style.opacity = "0.3";

        // Particelle dorate
        const targetCenterX = targetRect.left + targetRect.width/2;
        const targetCenterY = targetRect.top + targetRect.height/2;
        createParticles(targetCenterX, targetCenterY);

        overlay.classList.remove("show");
        await sleep(500);
    }

    // Mostra scritta finale epica
    // Mostra scritta finale epica
    finalText.style.display = "flex"; // rende visibile
    // Riavvia animazione
    finalText.style.animation = "none"; 
    void finalText.offsetWidth; // trigger reflow
    finalText.style.animation = "finalText 2s forwards";
}
</script>

</body>
</html>
