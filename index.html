<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteggio Gironi Fantaltech</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    padding: 30px;
}

h1 { margin-bottom: 10px; }

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ffcc00;
    color: black;
    font-weight: bold;
    transition: transform 0.2s ease;
}

button:hover { transform: scale(1.1); }

button:disabled {
    background: grey;
    cursor: not-allowed;
}

.section {
    margin-top: 30px;
}

.teams-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.team {
    background: rgba(255,255,255,0.15);
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.4s ease;
}

.extracting {
    background: #ffcc00 !important;
    color: black;
    transform: scale(1.2);
}

.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 30px;
}

.girone {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    width: 220px;
    min-height: 250px;
}

.girone h2 { margin-top: 0; }

.fade-in {
    animation: fadeIn 0.5s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<h1>🎲 Sorteggio Ufficiale Fantaltech</h1>

<div class="section">
    <h3>Squadre Partecipanti</h3>
    <div class="teams-list" id="teamsContainer"></div>
</div>

<button id="drawBtn" onclick="startDraw()">Estrai Gironi</button>

<div class="container">
    <div class="girone" id="giochisti">
        <h2>⚽ Giochisti</h2>
    </div>
    <div class="girone" id="risultatisti">
        <h2>🔥 Risultatisti</h2>
    </div>
</div>

<script>
const teams = [
    "hogiavinto",
    "morteam",
    "#finoallafinale",
    "hertha vernello",
    "kucos fellas",
    "smitolo",
    "Ahanor Londo",
    "Ribaltone"
];

const teamsContainer = document.getElementById("teamsContainer");
const giochistiDiv = document.getElementById("giochisti");
const risultatistiDiv = document.getElementById("risultatisti");
const button = document.getElementById("drawBtn");

// Mostra squadre iniziali
teams.forEach(team => {
    const div = document.createElement("div");
    div.classList.add("team");
    div.textContent = team;
    teamsContainer.appendChild(div);
});

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startDraw() {

    button.disabled = true;

    // Reset gironi
    giochistiDiv.innerHTML = "<h2>⚽ Giochisti</h2>";
    risultatistiDiv.innerHTML = "<h2>🔥 Risultatisti</h2>";

    const shuffled = [...teams];
    shuffle(shuffled);

    const teamElements = document.querySelectorAll(".team");

    for (let i = 0; i < shuffled.length; i++) {

        const teamName = shuffled[i];

        const currentElement = [...teamElements].find(el => el.textContent === teamName);

        currentElement.classList.add("extracting");

        await sleep(1000);

        currentElement.classList.remove("extracting");
        currentElement.style.opacity = "0.3";

        const newDiv = document.createElement("div");
        newDiv.classList.add("team", "fade-in");
        newDiv.textContent = teamName;

        if (i < 4) {
            giochistiDiv.appendChild(newDiv);
        } else {
            risultatistiDiv.appendChild(newDiv);
        }

        await sleep(500);
    }
}
</script>

</body>
</html>
