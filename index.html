<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteggio Gironi Fantaltech</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    padding: 30px;
}

h1 { margin-bottom: 10px; }

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ffcc00;
    color: black;
    font-weight: bold;
    transition: transform 0.2s ease;
}

button:hover { transform: scale(1.1); }

button:disabled {
    background: grey;
    cursor: not-allowed;
}

.section {
    margin-top: 30px;
}

.teams-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.team {
    background: rgba(255,255,255,0.15);
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.4s ease;
}

.extracting {
    background: #ffcc00 !important;
    color: black;
    transform: scale(1.2);
}

.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 30px;
}

.girone {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    width: 220px;
    min-height: 250px;
}

.girone h2 { margin-top: 0; }

.fade-in {
    animation: fadeIn 0.5s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* OVERLAY CERIMONIA */
.overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,0.9) 40%, black 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 42px;
    font-weight: bold;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 1000;
}

.overlay.show {
    opacity: 1;
}

.overlay .team-name {
    font-size: 50px;
    margin-bottom: 20px;
}

.overlay .group-name {
    font-size: 28px;
    letter-spacing: 3px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
}

.overlay.reveal .group-name {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<h1>🎲 Sorteggio Ufficiale Fantaltech</h1>

<div class="section">
    <h3>Squadre Partecipanti</h3>
    <div class="teams-list" id="teamsContainer"></div>
</div>

<button id="drawBtn" onclick="startDraw()">Estrai Gironi</button>

<div class="container">
    <div class="girone" id="giochisti">
        <h2>⚽ Giochisti</h2>
    </div>
    <div class="girone" id="risultatisti">
        <h2>🔥 Risultatisti</h2>
    </div>
</div>

<!-- OVERLAY TEATRALE -->
<div class="overlay" id="ceremonyOverlay">
    <div class="team-name" id="overlayTeam"></div>
    <div class="group-name" id="overlayGroup"></div>
</div>

<script>
const teams = [
    "hogiavinto",
    "morteam",
    "#finoallafinale",
    "hertha vernello",
    "kucos fellas",
    "smitolo",
    "Ahanor Londo",
    "Ribaltone"
];

const teamsContainer = document.getElementById("teamsContainer");
const giochistiDiv = document.getElementById("giochisti");
const risultatistiDiv = document.getElementById("risultatisti");
const button = document.getElementById("drawBtn");

// Mostra squadre iniziali
teams.forEach(team => {
    const div = document.createElement("div");
    div.classList.add("team");
    div.textContent = team;
    teamsContainer.appendChild(div);
});

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startDraw() {

    button.disabled = true;

    giochistiDiv.innerHTML = "<h2>⚽ Giochisti</h2>";
    risultatistiDiv.innerHTML = "<h2>🔥 Risultatisti</h2>";

    const shuffled = [...teams];
    shuffle(shuffled);

    let countGiochisti = 0;
    let countRisultatisti = 0;

    const overlay = document.getElementById("ceremonyOverlay");
    const overlayTeam = document.getElementById("overlayTeam");
    const overlayGroup = document.getElementById("overlayGroup");

    const teamElements = document.querySelectorAll(".team");

    for (let i = 0; i < shuffled.length; i++) {

        const teamName = shuffled[i];
        const currentElement = [...teamElements].find(el => el.textContent === teamName);

        // Mostra overlay
        overlayTeam.textContent = teamName;
        overlayGroup.textContent = "";
        overlay.classList.add("show");
        overlay.classList.remove("reveal");

        await sleep(1500); // suspense

        // Decidi girone
        let assignTo;
        if (countGiochisti === 4) {
            assignTo = "RISULTATISTI";
        } else if (countRisultatisti === 4) {
            assignTo = "GIOCHISTI";
        } else {
            assignTo = Math.random() < 0.5 ? "GIOCHISTI" : "RISULTATISTI";
        }

        overlayGroup.textContent = "→ " + assignTo;
        overlay.classList.add("reveal");

        await sleep(1500); // reveal

        overlay.classList.remove("show");

        const newDiv = document.createElement("div");
        newDiv.classList.add("team", "fade-in");
        newDiv.textContent = teamName;

        if (assignTo === "GIOCHISTI") {
            giochistiDiv.appendChild(newDiv);
            countGiochisti++;
        } else {
            risultatistiDiv.appendChild(newDiv);
            countRisultatisti++;
        }

        currentElement.style.opacity = "0.3"; // sfuma il nome originale
        await sleep(600);
    }
}
</script>

</body>
</html>
